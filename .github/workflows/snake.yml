name: generate animation

on:
  schedule:
    - cron: "0 */24 * * *" # 24시간마다 실행
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: 11Won11
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#1b4332&color_dots=#ebedf0,#a3b18a,#588157,#3a5a40,#344e41
            dist/github-contribution-grid-snake-dark.svg?color_snake=#7d5ba6&color_dots=#0d1117,#161b22,#2d333b,#404854,#5e60ce
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          

          
